<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="description" content="魚辺（うおへん）の漢字の読みをローマ字でタイピングする練習ゲーム">
  <title>魚辺タイピング</title>
  <link rel="stylesheet" href="css/style.css">
</head>
<body>
  <div id="app">

    <!-- タイトル画面 -->
    <div id="screen-title" class="screen active">
      <div class="title-card">
        <h1>🐟 魚辺タイピング</h1>
        <p class="subtitle">
          出題範囲を選んで、魚・海の生き物の漢字の読みをローマ字でタイピング！<br>
          現在の出題プール: <span id="pool-size"></span> 問
        </p>

        <div class="settings">
          <div class="setting-row" id="setting-pool">
            <span class="setting-label">出題範囲</span>
            <span class="setting-value">すべて</span>
          </div>
          <div class="setting-row" id="setting-questions">
            <span class="setting-label">問題数</span>
            <span class="setting-value">40問</span>
          </div>
          <div class="setting-row" id="setting-time">
            <span class="setting-label">制限時間</span>
            <span class="setting-value">60秒</span>
          </div>
          <div class="setting-row" id="setting-reading">
            <span class="setting-label">読み仮名</span>
            <span class="setting-value">なし</span>
          </div>
          <div class="setting-row" id="setting-fish">
            <span class="setting-label">魚・背景表示</span>
            <span class="setting-value">ON</span>
          </div>
          <div class="setting-row" id="setting-sound">
            <span class="setting-label">効果音</span>
            <span class="setting-value">ON</span>
          </div>
        </div>

        <button class="btn-start" id="btn-start">スタート</button>
        <p class="hint-keys">
          クリックで設定変更 ／ スペースキーでスタート
        </p>
      </div>
    </div>

    <!-- プレイ画面 -->
    <div id="screen-play" class="screen">
      <div id="game-area" tabindex="0">
        <div id="fish-container"></div>
        <div class="play-header">
          <span id="progress">1 / 40</span>
          <span id="timer">60</span>
        </div>
        <div class="play-main">
          <div id="hint-text"></div>
          <div id="kanji-display">鮭</div>
          <div class="input-area">
            <div class="input-label">ローマ字で入力</div>
            <div id="typed-input"></div>
          </div>
        </div>
        <div class="play-footer">
          <span id="play-footer-text">Enter＝ヒント（-5秒） ／ Esc＝やめる</span>
          <button type="button" class="btn-quit" id="btn-quit">やめる</button>
        </div>
      </div>
    </div>

    <!-- 結果画面 -->
    <div id="screen-result" class="screen">
      <div class="result-card">
        <h2 id="result-title">クリア！</h2>
        <div id="result-detail"></div>
        <button type="button" class="btn-start" id="btn-back-title">タイトルへ</button>
        <p class="result-keys">
          スペースキー＝リトライ ／ Esc＝タイトルに戻る
        </p>
      </div>
    </div>

  </div>

  <script src="js/kanji-data.js"></script>
  <script src="js/romaji.js"></script>
  <script src="js/game.js"></script>
</body>
</html>
